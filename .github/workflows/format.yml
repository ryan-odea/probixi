name: Auto-format Code

on:
  pull_request:
    branches: [main, devel*]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Sync version into citation files
        run: |
          python - <<'EOF'
          import pathlib, re

          root = pathlib.Path(".")
          pyproject = (root / "pyproject.toml").read_text()
          version = re.search(r'(?m)^version\s*=\s*"([^"]+)"', pyproject).group(1)

          # CITATION.cff
          cff = root / "CITATION.cff"
          cff.write_text(re.sub(r"(?m)^version:.*$", f"version: {version}", cff.read_text()))

          # citation.bib
          bib_path = root / "docs" / "assets" / "citation.bib"
          bib = re.sub(
              r"(?m)^(\s*version\s*=\s*\{)[^}]*(\})",
              lambda m: m.group(1) + version + m.group(2),
              bib_path.read_text(),
          )
          bib_path.write_text(bib)

          driver = root / "probixi" / "probixi.py"
          block = (
              "# --- BEGIN GENERATED CITATION ---\n"
              '_CITATION = r"""\n' + bib.strip() + '\n"""\n'
              "# --- END GENERATED CITATION ---"
          )
          driver.write_text(re.sub(
              r"# --- BEGIN GENERATED CITATION.*?# --- END GENERATED CITATION ---",
              lambda _: block,
              driver.read_text(),
              flags=re.S,
          ))
          print(f"Synced version {version} into CITATION.cff, docs/assets/citation.bib, and probixi.py")
          EOF

      - name: Install formatters
        run: pip install black isort ruff

      - name: Auto-fix lint issues with Ruff
        run: ruff check --fix --exit-zero .

      - name: Sort imports with isort
        run: isort .

      - name: Format with Black
        run: black .

      - name: Commit changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git diff --quiet || (git add -A && git commit -m "Auto-format code (black, isort, ruff)")
          git push

      - name: Flag remaining lint issues with Ruff
        run: ruff check --output-format=github .
